<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>VLUTE AR - Project SDP</title>
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
        body { margin: 0; background-color: #f0f0f0; font-family: sans-serif; }
        model-viewer { width: 100%; height: 100vh; }
        .loading-text { position: absolute; top: 10px; width: 100%; text-align: center; color: #666; }
    </style>
</head>
<body>
    <div class="loading-text">Mô hình đang tải, vui lòng đợi (50MB)...</div>

    <model-viewer 
        src="SDP.glb" 
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        camera-controls 
        auto-rotate 
        shadow-intensity="1"
        style="background-color: #eee;">
        
        <button slot="ar-button" style="background-color: white; border-radius: 8px; border: 1px solid #ccc; position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); padding: 12px 24px; font-weight: bold;">
            🤳 XEM TRONG KHÔNG GIAN THỰC
        </button>
        
    </model-viewer>
</body>
</html>
